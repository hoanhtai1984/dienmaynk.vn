<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Sản Phẩm - Điện Máy NK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/subpages.css">
</head>
<body>

<div id="header-placeholder"></div>

<main class="py-4 bg-light">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb m-0">
                <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-current">Điện Gia Dụng</li>
            </ol>
        </nav>

        <div class="row g-4">
            <aside class="col-lg-3 col-md-4">
                <div class="filter-sidebar bg-white p-4 rounded-3 border">
                    <h5 class="fw-bold mb-4 border-bottom pb-2"><i class="bi bi-funnel-fill text-warning"></i> Bộ lọc tìm kiếm</h5>

                    <div class="filter-group mb-4 d-none" id="sub-filter-block">
                        <h6 class="fw-bold mb-2">Danh mục con</h6>
                        <div id="sub-filter-list" class="sub-filter-list"></div>
                    </div>

                    <div class="filter-group mb-4">
                        <h6 class="fw-bold mb-2">Thương hiệu</h6>
                        <div id="brand-filter-list"></div>
                    </div>

                    <div class="filter-group mb-4">
                        <h6 class="fw-bold mb-2">Khoảng giá</h6>
                        <div class="form-check mb-2">
                            <input class="form-check-input price-filter-radio" type="radio" name="price-filter" id="price-all" value="all" checked>
                            <label class="form-check-label" for="price-all">Tất cả</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input price-filter-radio" type="radio" name="price-filter" id="price-1" value="0-1000000">
                            <label class="form-check-label" for="price-1">Dưới 1 triệu</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input price-filter-radio" type="radio" name="price-filter" id="price-2" value="1000000-3000000">
                            <label class="form-check-label" for="price-2">1 triệu - 3 triệu</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input price-filter-radio" type="radio" name="price-filter" id="price-3" value="3000000-999999999">
                            <label class="form-check-label" for="price-3">Trên 3 triệu</label>
                        </div>
                    </div>

                    <button class="btn btn-warning w-100 fw-bold rounded-pill text-dark" id="apply-filter-btn">Áp Dụng Bộ Lọc</button>
                    <button class="btn btn-link w-100 text-muted small mt-2" id="reset-filter-btn">Xóa bộ lọc</button>
                </div>
            </aside>

            <section class="col-lg-9 col-md-8">
                <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded-3 border mb-4 flex-wrap gap-2">
                    <h5 class="m-0 fw-bold">
                        <span id="category-title">Sản phẩm</span>
                        (<span class="text-danger" id="product-count">0</span> sản phẩm)
                    </h5>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted small text-nowrap">Sắp xếp theo:</span>
                        <select class="form-select form-select-sm border-secondary-subtle" id="sort-select">
                            <option value="newest" selected>Mới nhất</option>
                            <option value="price-asc">Giá từ thấp đến cao</option>
                            <option value="price-desc">Giá từ cao đến thấp</option>
                            <option value="bestseller">Bán chạy nhất</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3" id="product-grid">
                    <!-- Sản phẩm được render động bởi assets/js/category.js -->
                </div>

                <div class="text-center py-5 d-none" id="empty-state">
                    <i class="bi bi-inboxes text-muted" style="font-size: 3rem;"></i>
                    <p class="text-muted mt-2 mb-0">Không tìm thấy sản phẩm phù hợp với bộ lọc đã chọn.</p>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/products-data.js"></script>
<script src="assets/js/cart-manager.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/search.js"></script>
<script src="assets/js/category.js"></script>
</body>
</html>
